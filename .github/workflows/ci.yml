name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run m0f:validate
      - run: npm run licenses:check
      - run: npm audit --audit-level=high
      - run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-inventory
          path: .artifacts/license-inventory.json
          if-no-files-found: ignore

  e2e:
    name: E2E (${{ matrix.project }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            project: chromium
            browser: chromium
          - os: windows-latest
            project: edge
            browser: edge
          - os: ubuntu-latest
            project: firefox
            browser: firefox
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        if: matrix.browser != 'edge'
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npm run test:e2e -- --project=${{ matrix.project }}
      - name: Capture candidate M0F Worker measurements
        run: npm run test:e2e:m0f-worker:matrix -- --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m0f-worker-measurements-${{ matrix.project }}
          path: .artifacts/m0f-worker-measurements/${{ matrix.project }}/
          if-no-files-found: ignore

  pages-build:
    name: Pages base-path smoke and build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, e2e]
    permissions:
      contents: read
      pages: read
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /${{ github.event.repository.name }}/
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:43117/${{ github.event.repository.name }}/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  pages-deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_GITHUB_PAGES == 'true'
    needs: pages-build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
